[tox]
envlist =
    py{310,311,312,313}-dj{52}
    py{312,313,314}-dj60
    py{312,313,314}-djmain
skip_missing_interpreters = true

[testenv]
usedevelop=True
ignore_outcome =
    djmain: True
ignore_errors =
    djmain: True
deps=
    dj52: Django>=5.2,<5.3
    dj60: Django>=6.0,<6.1
    djmain: https://github.com/django/django/archive/main.tar.gz
extras=
  braintree
  cybersource
  dev
  mercadopago
  sagepay
  sofort
  stripe
commands=
    pytest {posargs}
    coverage xml

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv:mypy]
setenv =
  PYTHONPATH = {env:PATH}/testapp
extras = {[testenv]extras}
commands = mypy .

[gh-actions:env]
DJANGO =
    5.2: dj52
    6.0: dj60
    main: djmain

[testenv:docs]
deps =
  {[testenv]deps}
  sphinx-autobuild
extras=docs
commands =
  sphinx-autobuild docs/ docs/_build/html --port 9009
whitelist_externals =
  make
